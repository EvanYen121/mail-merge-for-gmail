<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Merge for Gmail</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <rect width="48" height="48" rx="8" fill="#4285F4"/>
          <rect x="6" y="12" width="36" height="24" rx="3" fill="none" stroke="white" stroke-width="2"/>
          <path d="M6 16l18 12 18-12" stroke="white" stroke-width="2" fill="none"/>
          <circle cx="36" cy="30" r="5" fill="#34A853"/>
          <path d="M33 30h6M36 27v6" stroke="white" stroke-width="1.5"/>
        </svg>
        <span>Mail Merge for Gmail</span>
      </div>
      <button id="btn-settings" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </header>

    <div id="view-signed-out" class="view">
      <div class="auth-section">
        <p class="auth-desc">Sign in with Google to start sending personalized emails.</p>
        <button id="btn-signin" class="btn btn-primary btn-full">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <div id="view-signed-in" class="view hidden">
      <div class="user-info">
        <img id="user-avatar" src="" alt="Avatar" class="avatar" onerror="this.style.display='none'">
        <div class="user-details">
          <div id="user-name" class="user-name"></div>
          <div id="user-email" class="user-email"></div>
        </div>
        <button id="btn-signout" class="link-btn">Sign out</button>
      </div>

      <div class="stats-row">
        <div class="stat-card">
          <div id="stat-sent-today" class="stat-value">0</div>
          <div class="stat-label">Sent today</div>
        </div>
        <div class="stat-card">
          <div id="stat-quota" class="stat-value">400</div>
          <div class="stat-label">Remaining quota</div>
        </div>
        <div class="stat-card">
          <div id="stat-scheduled" class="stat-value">0</div>
          <div class="stat-label">Scheduled</div>
        </div>
      </div>

      <div class="actions">
        <button id="btn-open-app" class="btn btn-primary btn-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Start Mail Merge
        </button>
        <button id="btn-view-campaigns" class="btn btn-secondary btn-full">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          View Campaigns
        </button>
      </div>
    </div>

    <div id="view-loading" class="view hidden">
      <div class="loading-center">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
